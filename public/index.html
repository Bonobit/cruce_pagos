<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conciliación Gestor vs TNS</title>
  <style>
    /* ─── Reset & Variables ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-dark:   #1F4E79;
      --blue:        #2E75B6;
      --blue-light:  #BDD7EE;
      --green:       #70AD47;
      --green-light: #E2EFDA;
      --yellow:      #FFD966;
      --yellow-light:#FFF2CC;
      --orange-light:#FCE4D6;
      --red:         #C00000;
      --gray-50:     #F8F9FA;
      --gray-100:    #F0F2F5;
      --gray-200:    #E1E4E8;
      --gray-400:    #9CA3AF;
      --gray-600:    #4B5563;
      --gray-800:    #1F2937;
      --white:       #FFFFFF;
      --radius:      10px;
      --shadow:      0 2px 12px rgba(0,0,0,.10);
      --shadow-lg:   0 8px 32px rgba(0,0,0,.14);
      --transition:  .2s ease;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--gray-100);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ─── Header ────────────────────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
      color: var(--white);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow-lg);
    }
    header .logo { font-size: 28px; }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: .3px; }
    header p { font-size: 13px; opacity: .8; margin-top: 2px; }

    /* ─── Main layout ───────────────────────────────────────────────────── */
    main {
      max-width: 1300px;
      margin: 32px auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ─── Card ──────────────────────────────────────────────────────────── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 28px;
    }
    .card h2 {
      font-size: 15px;
      font-weight: 700;
      color: var(--blue-dark);
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--blue-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ─── Module Tabs ───────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 8px;
    }
    .tab-btn {
      padding: 10px 28px;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      background: var(--white);
      color: var(--gray-600);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .tab-btn:hover { border-color: var(--blue); color: var(--blue); }
    .tab-btn.active {
      background: var(--blue-dark);
      border-color: var(--blue-dark);
      color: var(--white);
    }

    /* ─── Upload panels ─────────────────────────────────────────────────── */
    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 700px) { .upload-grid { grid-template-columns: 1fr; } }

    .upload-panel {
      border: 2px dashed var(--gray-200);
      border-radius: var(--radius);
      padding: 20px;
      transition: var(--transition);
      position: relative;
    }
    .upload-panel:hover { border-color: var(--blue); }
    .upload-panel.loaded { border-color: var(--green); border-style: solid; background: var(--green-light); }
    .upload-panel label.title {
      display: block;
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 12px;
      color: var(--blue-dark);
    }

    .file-input-wrap {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .file-input-wrap input[type="file"] { display: none; }
    .btn-file {
      padding: 8px 18px;
      border-radius: 6px;
      border: 1.5px solid var(--blue);
      background: var(--white);
      color: var(--blue);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-file:hover { background: var(--blue); color: var(--white); }

    .file-name {
      font-size: 12px;
      color: var(--gray-600);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .upload-info {
      margin-top: 10px;
      font-size: 12px;
      color: var(--gray-600);
    }
    .upload-info span.cols {
      display: block;
      margin-top: 4px;
      color: var(--blue);
      font-style: italic;
    }
    .upload-info .badge-col {
      display: inline-block;
      background: var(--blue-light);
      color: var(--blue-dark);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      margin: 2px 2px 0 0;
    }

    /* ─── Actions ───────────────────────────────────────────────────────── */
    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 11px 24px;
      border-radius: 7px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--blue-dark); color: var(--white); }
    .btn-primary:hover:not(:disabled) { background: var(--blue); }
    .btn-success { background: var(--green); color: var(--white); }
    .btn-success:hover:not(:disabled) { background: #5a9438; }
    .btn-danger { background: transparent; color: var(--red); border: 1.5px solid var(--red); }
    .btn-danger:hover:not(:disabled) { background: var(--red); color: var(--white); }

    /* ─── Warnings ──────────────────────────────────────────────────────── */
    .warnings {
      background: var(--yellow-light);
      border-left: 4px solid var(--yellow);
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 13px;
      color: #7d6008;
    }
    .warnings ul { padding-left: 16px; margin-top: 4px; }

    /* ─── Summary chips ─────────────────────────────────────────────────── */
    .summary {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 13px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 13px;
    }
    .chip-total   { background: var(--blue-light); color: var(--blue-dark); }
    .chip-ambos   { background: var(--green-light); color: #375623; }
    .chip-gestor  { background: var(--yellow-light); color: #7d6008; }
    .chip-tns     { background: var(--orange-light); color: #833c00; }

    /* ─── Column detection info ─────────────────────────────────────────── */
    .col-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 12px;
      color: var(--gray-600);
    }
    .col-info strong { color: var(--gray-800); }

    /* ─── Table ─────────────────────────────────────────────────────────── */
    .table-wrap {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid var(--gray-200);
      max-height: 520px;
      overflow-y: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead tr {
      background: var(--blue-dark);
      color: var(--white);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    thead th {
      padding: 12px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: .3px;
      white-space: nowrap;
    }
    thead th.center { text-align: center; }
    tbody tr { border-bottom: 1px solid var(--gray-200); transition: background .12s; }
    tbody tr:hover { filter: brightness(.96); }
    tbody td {
      padding: 10px 14px;
      vertical-align: middle;
    }
    tbody td.center { text-align: center; }

    /* Row colors by estado */
    .row-ambos  { background: var(--green-light); }
    .row-gestor { background: var(--yellow-light); }
    .row-tns    { background: var(--orange-light); }

    .mark-x {
      display: inline-block;
      width: 22px; height: 22px;
      line-height: 22px;
      text-align: center;
      background: var(--blue-dark);
      color: var(--white);
      border-radius: 4px;
      font-weight: 900;
      font-size: 12px;
    }
    .mark-empty {
      display: inline-block;
      width: 22px; height: 22px;
      border: 1.5px dashed var(--gray-200);
      border-radius: 4px;
    }

    .badge-estado {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-ambos  { background: #c6e0b4; color: #375623; }
    .badge-gestor { background: var(--yellow); color: #7d6008; }
    .badge-tns    { background: #f4b183; color: #833c00; }

    /* ─── Filter bar ─────────────────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-bar input {
      flex: 1;
      min-width: 180px;
      padding: 8px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: 6px;
      font-size: 13px;
      transition: border-color var(--transition);
    }
    .filter-bar input:focus { outline: none; border-color: var(--blue); }
    .filter-bar select {
      padding: 8px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      background: var(--white);
    }

    /* ─── Loading spinner ────────────────────────────────────────────────── */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading .spinner { display: inline-block; }
    .loading .btn-label { display: none; }

    /* ─── Toast ──────────────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--gray-800); color: white;
      padding: 12px 20px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      box-shadow: var(--shadow-lg);
      transform: translateY(80px);
      opacity: 0;
      transition: .3s ease;
      z-index: 999;
      max-width: 360px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { background: var(--red); }
    #toast.success { background: var(--green); }

    /* ─── Empty state ────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--gray-400);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>

<header>
  <span class="logo">📊</span>
  <div>
    <h1>Conciliación Gestor vs TNS</h1>
    <p>Cruce de registros por módulo — Pagos &amp; Letras</p>
  </div>
</header>

<main>
  <!-- ① Módulo selector -->
  <div class="card">
    <h2>① Seleccionar Módulo</h2>
    <div class="tabs">
      <button class="tab-btn active" data-modulo="pagos" onclick="setModulo('pagos')">
        💳 Pagos
      </button>
      <button class="tab-btn" data-modulo="letras" onclick="setModulo('letras')">
        📄 Letras
      </button>
    </div>
  </div>

  <!-- ② Upload -->
  <div class="card">
    <h2>② Cargar Archivos</h2>
    <div class="upload-grid">
      <!-- GESTOR -->
      <div class="upload-panel" id="panel-gestor">
        <label class="title">📁 Archivo GESTOR</label>
        <div class="file-input-wrap">
          <label class="btn-file">
            Elegir archivo
            <input type="file" id="file-gestor" accept=".xlsx,.xls,.csv"
                   onchange="uploadFile('gestor', this)" />
          </label>
          <span class="file-name" id="name-gestor">Sin archivo</span>
        </div>
        <div class="upload-info" id="info-gestor"></div>
      </div>

      <!-- TNS -->
      <div class="upload-panel" id="panel-tns">
        <label class="title">🏦 Archivo TNS</label>
        <div class="file-input-wrap">
          <label class="btn-file">
            Elegir archivo
            <input type="file" id="file-tns" accept=".xlsx,.xls,.csv"
                   onchange="uploadFile('tns', this)" />
          </label>
          <span class="file-name" id="name-tns">Sin archivo</span>
        </div>
        <div class="upload-info" id="info-tns"></div>
      </div>
    </div>
  </div>

  <!-- ③ Actions -->
  <div class="card">
    <h2>③ Generar Cruce</h2>
    <div class="actions">
      <button class="btn btn-primary" id="btn-cruce" onclick="generarCruce()">
        <span class="spinner"></span>
        <span class="btn-label">🔀 Generar cruce</span>
      </button>
      <button class="btn btn-success" id="btn-excel" onclick="descargarExcel()" disabled>
        ⬇️ Descargar Excel
      </button>
      <button class="btn btn-danger" onclick="resetModulo()">
        🗑️ Limpiar módulo
      </button>
    </div>
  </div>

  <!-- ④ Results -->
  <div class="card" id="results-card" style="display:none">
    <h2>④ Resultado del Cruce</h2>

    <!-- Warnings -->
    <div class="warnings" id="warnings-box" style="display:none">
      <strong>⚠️ Avisos de detección automática:</strong>
      <ul id="warnings-list"></ul>
    </div>

    <!-- Column detection -->
    <div style="margin: 14px 0 18px;">
      <div class="col-info" id="col-info"></div>
    </div>

    <!-- Summary -->
    <div class="summary" id="summary" style="margin-bottom:16px;"></div>

    <!-- Filter -->
    <div class="filter-bar" style="margin-bottom:14px;">
      <input type="text" id="search-input" placeholder="🔍 Buscar por registro..."
             oninput="filterTable()" />
      <select id="filter-estado" onchange="filterTable()">
        <option value="">Todos los estados</option>
        <option value="Ambos">✅ Ambos</option>
        <option value="Solo Gestor">🟡 Solo Gestor</option>
        <option value="Solo TNS">🟠 Solo TNS</option>
      </select>
      <select id="filter-tipo" onchange="filterTable()">
        <option value="">Todos los tipos</option>
        <option value="RECIBO">RECIBO</option>
        <option value="LETRA">LETRA</option>
      </select>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table id="result-table">
        <thead>
          <tr>
            <th onclick="sortTable('registro')" style="cursor:pointer">Registro ↕</th>
            <th onclick="sortTable('tipo')" style="cursor:pointer">Tipo ↕</th>
            <th class="center" onclick="sortTable('fechaVto')" style="cursor:pointer">Fecha Vto ↕</th>
            <th class="center">Gestor</th>
            <th class="center">TNS</th>
            <th onclick="sortTable('estadoConciliacion')" style="cursor:pointer">Estado ↕</th>
          </tr>
        </thead>
        <tbody id="result-body"></tbody>
      </table>
    </div>

    <div style="margin-top:10px; font-size:12px; color:var(--gray-400);" id="row-count"></div>
  </div>
</main>

<div id="toast"></div>

<script>
// ──────────────────────────────────────────────────────────────────────────────
// State
// ──────────────────────────────────────────────────────────────────────────────
let currentModulo = 'pagos';
let allRows = [];
let sortKey = 'estadoConciliacion';
let sortAsc = true;

// ──────────────────────────────────────────────────────────────────────────────
// Module selection
// ──────────────────────────────────────────────────────────────────────────────
function setModulo(m) {
  currentModulo = m;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.modulo === m));
  // Reset UI for new modulo
  hideResults();
  document.getElementById('name-gestor').textContent = 'Sin archivo';
  document.getElementById('name-tns').textContent = 'Sin archivo';
  document.getElementById('info-gestor').innerHTML = '';
  document.getElementById('info-tns').innerHTML = '';
  document.getElementById('panel-gestor').classList.remove('loaded');
  document.getElementById('panel-tns').classList.remove('loaded');
  document.getElementById('file-gestor').value = '';
  document.getElementById('file-tns').value = '';
  document.getElementById('btn-excel').disabled = true;
}

// ──────────────────────────────────────────────────────────────────────────────
// Upload
// ──────────────────────────────────────────────────────────────────────────────
async function uploadFile(source, input) {
  const file = input.files[0];
  if (!file) return;

  document.getElementById(`name-${source}`).textContent = file.name;
  const fd = new FormData();
  fd.append('file', file);

  try {
    const res = await fetch(`/api/upload/${source}?modulo=${currentModulo}`, {
      method: 'POST', body: fd
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    document.getElementById(`panel-${source}`).classList.add('loaded');
    document.getElementById(`info-${source}`).innerHTML =
      `✅ <strong>${data.rows} filas</strong> cargadas.<br>` +
      `<span class="cols">${data.columns.map(c => `<span class="badge-col">${c}</span>`).join('')}</span>`;
    toast(`${source.toUpperCase()} cargado: ${data.rows} registros`, 'success');
  } catch (err) {
    toast(`Error cargando ${source}: ${err.message}`, 'error');
    document.getElementById(`panel-${source}`).classList.remove('loaded');
  }
}

// ──────────────────────────────────────────────────────────────────────────────
// Generate cruce
// ──────────────────────────────────────────────────────────────────────────────
async function generarCruce() {
  const btn = document.getElementById('btn-cruce');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch(`/api/cruce?modulo=${currentModulo}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    allRows = data.rows;
    renderResults(data);
    document.getElementById('btn-excel').disabled = false;
    toast(`Cruce generado: ${data.rows.length} registros`, 'success');
  } catch (err) {
    toast(`Error: ${err.message}`, 'error');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function renderResults(data) {
  // Warnings
  const wb = document.getElementById('warnings-box');
  const wl = document.getElementById('warnings-list');
  if (data.warnings && data.warnings.length > 0) {
    wl.innerHTML = data.warnings.map(w => `<li>${w}</li>`).join('');
    wb.style.display = 'block';
  } else {
    wb.style.display = 'none';
  }

  // Column info
  const ci = data.columnInfo;
  document.getElementById('col-info').innerHTML = `
    <div>📁 <strong>GESTOR</strong> — Registro: <em>${ci.gestor.registro || '—'}</em> | Fecha: <em>${ci.gestor.fechaVto || '—'}</em></div>
    <div>🏦 <strong>TNS</strong> — Registro: <em>${ci.tns.registro || '—'}</em> | Fecha: <em>${ci.tns.fechaVto || '—'}</em></div>
  `;

  // Summary
  const rows = data.rows;
  const ambos = rows.filter(r => r.estadoConciliacion === 'Ambos').length;
  const sg = rows.filter(r => r.estadoConciliacion === 'Solo Gestor').length;
  const st = rows.filter(r => r.estadoConciliacion === 'Solo TNS').length;
  document.getElementById('summary').innerHTML = `
    <span class="chip chip-total">📊 Total: ${rows.length}</span>
    <span class="chip chip-ambos">✅ Ambos: ${ambos}</span>
    <span class="chip chip-gestor">🟡 Solo Gestor: ${sg}</span>
    <span class="chip chip-tns">🟠 Solo TNS: ${st}</span>
  `;

  // Reset filters
  document.getElementById('search-input').value = '';
  document.getElementById('filter-estado').value = '';
  document.getElementById('filter-tipo').value = '';

  renderTable(rows);
  document.getElementById('results-card').style.display = 'block';
  document.getElementById('results-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderTable(rows) {
  const body = document.getElementById('result-body');
  if (rows.length === 0) {
    body.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="icon">🔍</div><p>Sin resultados con los filtros aplicados.</p></div></td></tr>`;
    document.getElementById('row-count').textContent = '';
    return;
  }

  body.innerHTML = rows.map(r => {
    const cls = r.estadoConciliacion === 'Ambos' ? 'row-ambos'
              : r.estadoConciliacion === 'Solo Gestor' ? 'row-gestor' : 'row-tns';
    const badgeCls = r.estadoConciliacion === 'Ambos' ? 'badge-ambos'
                   : r.estadoConciliacion === 'Solo Gestor' ? 'badge-gestor' : 'badge-tns';
    const gx = r.gestor ? '<span class="mark-x">X</span>' : '<span class="mark-empty"></span>';
    const tx = r.tns    ? '<span class="mark-x">X</span>' : '<span class="mark-empty"></span>';
    return `
      <tr class="${cls}">
        <td><code style="font-size:12px">${esc(r.registro)}</code></td>
        <td>${esc(r.tipo)}</td>
        <td class="center">${esc(r.fechaVto)}</td>
        <td class="center">${gx}</td>
        <td class="center">${tx}</td>
        <td><span class="badge-estado ${badgeCls}">${r.estadoConciliacion}</span></td>
      </tr>`;
  }).join('');

  document.getElementById('row-count').textContent =
    `Mostrando ${rows.length} de ${allRows.length} registros`;
}

// ──────────────────────────────────────────────────────────────────────────────
// Filter & sort
// ──────────────────────────────────────────────────────────────────────────────
function filterTable() {
  const q = document.getElementById('search-input').value.toUpperCase().trim();
  const estado = document.getElementById('filter-estado').value;
  const tipo = document.getElementById('filter-tipo').value;

  let filtered = allRows.filter(r => {
    const matchQ = !q || r.registro.includes(q) || r.tipo.includes(q);
    const matchE = !estado || r.estadoConciliacion === estado;
    const matchT = !tipo || r.tipo === tipo;
    return matchQ && matchE && matchT;
  });

  filtered = sortRows(filtered, sortKey, sortAsc);
  renderTable(filtered);
}

function sortTable(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  filterTable();
}

function sortRows(rows, key, asc) {
  return [...rows].sort((a, b) => {
    const va = a[key] || ''; const vb = b[key] || '';
    const cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return asc ? cmp : -cmp;
  });
}

// ──────────────────────────────────────────────────────────────────────────────
// Download Excel
// ──────────────────────────────────────────────────────────────────────────────
function descargarExcel() {
  window.location.href = `/api/cruce/excel?modulo=${currentModulo}`;
}

// ──────────────────────────────────────────────────────────────────────────────
// Reset
// ──────────────────────────────────────────────────────────────────────────────
async function resetModulo() {
  if (!confirm(`¿Limpiar el módulo ${currentModulo}? Se borrarán los archivos cargados.`)) return;
  await fetch(`/api/reset?modulo=${currentModulo}`, { method: 'DELETE' });
  setModulo(currentModulo);
  toast('Módulo limpiado.', 'success');
}

function hideResults() {
  document.getElementById('results-card').style.display = 'none';
  allRows = [];
}

// ──────────────────────────────────────────────────────────────────────────────
// Toast
// ──────────────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3500);
}

// ──────────────────────────────────────────────────────────────────────────────
// Utils
// ──────────────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
